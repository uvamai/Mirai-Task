services:
  - type: web
    name: mirai-api
    runtime: node
    plan: starter
    autoDeploy: true
    rootDir: .
    buildCommand: npm install && npm run build -w @mirai/api
    startCommand: npm run start -w @mirai/api
    preDeployCommand: npm run migrate -w @mirai/api
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: mirai-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ACCESS_TOKEN_TTL_MIN
        value: "15"
      - key: REFRESH_TOKEN_TTL_DAYS
        value: "7"
      - key: BILLING_MODE
        value: mock
      - key: GLOBAL_ADMIN_TENANT_SLUG
        value: mirai-admin
      - key: ALLOW_X_TENANT_ID
        value: "false"
      - key: STORAGE_DIR
        value: storage

  - type: worker
    name: mirai-worker
    runtime: node
    plan: starter
    autoDeploy: true
    rootDir: .
    buildCommand: npm install && npm run build -w @mirai/api
    startCommand: npm run worker -w @mirai/api
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: mirai-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: STORAGE_DIR
        value: storage
      - key: BILLING_MODE
        value: mock
      - key: GLOBAL_ADMIN_TENANT_SLUG
        value: mirai-admin

  - type: web
    name: mirai-web
    runtime: static
    plan: starter
    autoDeploy: true
    rootDir: .
    buildCommand: npm install && npm run build -w @mirai/web
    staticPublishPath: apps/web/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: VITE_API_BASE_URL
        value: https://mirai-api.onrender.com
      - key: VITE_SOCKET_ENABLED
        value: "false"

databases:
  - name: mirai-db
    databaseName: mirai_tasker
    user: mirai
    plan: starter
